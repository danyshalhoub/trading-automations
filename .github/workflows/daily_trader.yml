name: Daily Paper Trader

on:
  schedule:
    # 9:30 PM UTC = 5:30 PM ET — safely after US market close (4 PM ET)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    # Allows you to trigger a run manually from the GitHub Actions tab

permissions:
  contents: write   # needed so the action can commit positions.json back

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r "Trading Automations/paper_trader/requirements.txt"

      - name: Run trader
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python "Trading Automations/paper_trader/trader.py"

      - name: Save updated positions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Trading Automations/paper_trader/positions.json"
          git diff --staged --quiet || git commit -m "positions: $(date -u +'%Y-%m-%d')"
          git push
